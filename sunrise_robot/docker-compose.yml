version: "3.9"

services:
  comau_driver:
    build:
      context: .
      dockerfile: Dockerfile
    image: comau_ros2_driver:humble
    container_name: comau_ros2
    # Keep the container alive (the launcher connects to it via exec)
    tty: true
    stdin_open: true
    # Required for ROS2 DDS communication on the host network
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0          # change if needed
      - ROBOT_MODEL=racer7-14
      - ROBOT_IP=192.168.29.2
    # Uncomment below to share a config file or logs with the host
    # volumes:
    #   - ./config:/ros2_humble/config
    #   - ./logs:/ros2_humble/logs
    restart: unless-stopped
    command: >
      ros2 launch comau_bringup start_comau_client.launch.py
      robot_type:=racer7-14
      