services:

  comau_driver:
    build:
      context: ./sunrise_robot
      dockerfile: Dockerfile
    image: comau_ros2_driver:humble
    container_name: comau_ros2
    tty: true
    stdin_open: true
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROBOT_MODEL=racer7-14
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:rw
    restart: unless-stopped
    entrypoint: ["/entrypoint.sh"]
  
  speech:
    build:
      context: ./speech
      dockerfile: Dockerfile
    container_name: tactigon_speech_socket
    restart: unless-stopped
    network_mode: host
    environment:
      TSS_ADDRESS: localhost
      TSS_PORT: 50007
      TSS_CONFIG: config.json