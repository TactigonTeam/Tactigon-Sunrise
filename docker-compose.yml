services:

  sunrise:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sunrise
    restart: unless-stopped
    network_mode: host
    privileged: true
    environment:
      - ROS_DOMAIN_ID=0
      - SDL_AUDIODRIVER=dummy
    devices:
      - /dev:/dev
    volumes:
      - /var/run/dbus:/var/run/dbus

  tactigon-speech-socket:
    build:
      context: ./speech
      dockerfile: Dockerfile
    container_name: tactigon-speech-socket
    restart: unless-stopped
    network_mode: host
    environment:
      TSS_ADDRESS: localhost
      TSS_PORT: 50007
      TSS_CONFIG: config.json

  sunrise-comau:
    build:
      context: ./sunrise_robot
      dockerfile: Dockerfile
    container_name: sunrise-comau
    tty: true
    stdin_open: true
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROBOT_MODEL=racer7-14
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:rw
    restart: unless-stopped
    entrypoint: ["/entrypoint.sh"]

  sunrise-timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: sunrise-timescaledb
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=sunrise_db
    networks:
      - fiware_network
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5


  sunrise-mintaka:
    image: fiware/mintaka:0.6.18
    container_name: sunrise-mintaka
    hostname: sunrise-mintaka
    restart: always
    networks:
      - fiware_network
    ports:
      - "8080:8080"
    depends_on:
      - sunrise-timescaledb
    environment:
      - MICRONAUT_SERVER_PORT=8080
      - MICRONAUT_METRICS_ENABLED=true
      - ENDPOINTS_ALL_PORT=8080
      - ENDPOINTS_METRICS_ENABLED=true
      - ENDPOINTS_HEALTH_ENABLED=true
      - DATASOURCES_DEFAULT_HOST=sunrise-timescaledb
      - DATASOURCES_DEFAULT_PORT=5432
      - DATASOURCES_DEFAULT_USERNAME=admin
      - DATASOURCES_DEFAULT_PASSWORD=admin
      - DATASOURCES_DEFAULT_DATABASE=sunrise_db
      - LOGGERS_LEVEL_ROOT=TRACE

  sunrise-grafana:
    image: grafana/grafana:latest
    container_name: sunrise-grafana
    restart: always
    ports:
      - "3000:3000"
    networks:
      - fiware_network
    depends_on:
      - sunrise-timescaledb
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboard.yaml:/etc/grafana/provisioning/dashboards/dashboard.yaml
      - ./grafana/dashboards:/var/lib/grafana/dashboards_json

  mongodb:
    image: mongo:4.4
    container_name: fiware-mongodb
    networks:
      - fiware_network
    volumes:
      - mongodb_data:/data/db
    command: --nojournal
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FIWARE Orion Context Broker
  fiware-orion:
    image: fiware/orion:latest
    container_name: fiware-orion
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - fiware_network
    ports:
      - "1026:1026"
    # CORREZIONE: Usa -dbURI invece di -dbhost mongodb
    command: -dbURI mongodb://mongodb:27017 -logLevel DEBUG
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1026/version"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - ORION_LOG_LEVEL=DEBUG

  # Integration Service con Dynamic ROS2 e FIWARE System Handles
  integration-service:
    build:
      context: ./sunrise_fiware
      dockerfile: Dockerfile
    container_name: integration-service
    depends_on:
      fiware-orion:
        condition: service_healthy
    networks:
      - fiware_network
    volumes:
      - ./config:/config
      - is_workspace:/is_ws
    environment:
      - ROS_DOMAIN_ID=0
      - FIWARE_HOST=fiware-orion
      - FIWARE_PORT=1026
    stdin_open: true
    tty: true
    command: bash -c "tail -f /dev/null"

networks:
  fiware_network:
    driver: bridge


volumes:
  timescale_data:
  grafana_data:
  mongodb_data:
    driver: local
  is_workspace:
    driver: local