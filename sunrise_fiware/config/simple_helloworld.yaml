# Configurazione semplice per test Hello World
# File: simple_helloworld.yaml

systems:
  ros2:
    type: ros2_dynamic
    namespace: "/"
    node_name: "is_ros2_node"
    domain: 0
    using: 
      - std_msgs/String

  fiware:
    type: fiware
    host: orion
    port: 1026

routes:
  ros2_to_fiware: { from: ros2, to: fiware }
  fiware_to_ros2: { from: fiware, to: ros2 }

topics:
  hello_fiware:
    type: "std_msgs/String"
    route: ros2_to_fiware
    remap:
      fiware: 
        type: HelloWorld

  hello_ros2:
    type: "std_msgs/String"
    route: fiware_to_ros2
    remap:
      fiware:
        type: HelloWorld
